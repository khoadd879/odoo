services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - default

  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odoo_app
    # Run as root so entrypoint can write to host-mounted ./addons and ./odoo-data
    # (dev only — production should use proper uid mapping)
    user: '0:0'
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      # Pass through to odoo.conf via ${VAR} substitution
      ODOO_ADMIN_PASSWD: ${ODOO_ADMIN_PASSWD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      DB_NAME: ${DB_NAME:-odoo_dev}
      # Gmail SMTP (used if configuring outbound mail server in Settings)
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT}
      MAIL_SMTP_USER: ${MAIL_SMTP_USER}
      MAIL_SMTP_PASSWORD: ${MAIL_SMTP_PASSWORD}
      MAIL_SMTP_FROM: ${MAIL_SMTP_FROM}
      MAIL_SMTP_FROM_NAME: ${MAIL_SMTP_FROM_NAME}
      GROQ_API_KEY: ${GROQ_API_KEY}
      # Day 7 split — call the unified AI API
      RAG_API_BASE: ${RAG_API_BASE:-http://ai-api:9000}
      OCR_API_BASE: ${OCR_API_BASE:-http://ai-api:9000}
      AI_API_TOKEN: ${AI_API_TOKEN}
      RAG_RETRIEVE_TIMEOUT: ${RAG_RETRIEVE_TIMEOUT:-20}
    volumes:
      - ./addons:/mnt/extra-addons/oca
      - ./odoo-data:/var/lib/odoo
      - ./custom_addons:/mnt/extra-addons/custom
    ports:
      - "${ODOO_HTTP_PORT:-8069}:8069"
      - "${ODOO_LONGPOLLING_PORT:-8072}:8072"
    restart: unless-stopped
    networks:
      - default

  ai-api:
    # Day 7 split — stand-alone FastAPI service that powers both RAG and OCR.
    # Lives in services/steamships-ai-api/. The legacy `rag-api` hostname
    # still resolves via the network alias below so any older config keeps
    # working until fully migrated.
    build:
      context: ./services/steamships-ai-api
      dockerfile: Dockerfile
    container_name: steamships_ai_api
    command: ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port ${AI_API_PORT:-9000} --reload"]
    env_file: .env
    environment:
      PORT: ${AI_API_PORT:-9000}
      AI_API_TOKEN: ${AI_API_TOKEN}
      CHROMA_PATH: /data/chroma
      COLLECTION_NAME: steamships_rag
      DOCS_PATH: /docs/mock/rag_documents
      MANIFEST_PATH: /docs/mock/rag_documents/MANIFEST_ingestion_metadata.json
      CHUNK_SIZE: "800"
      CHUNK_OVERLAP: "100"
      TOP_K: "5"
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      # OPENAI_API_KEY and GROQ_API_KEY are passed through independently;
      # app/config.py picks OPENAI_API_KEY first and falls back to GROQ_API_KEY.
      # Nested interpolation like "${OPENAI_API_KEY:-${GROQ_API_KEY}}" is unsafe
      # in docker compose, so we keep them separate.
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-llama-3.3-70b-versatile}
    volumes:
      - ./chroma_data:/data/chroma
      - ./mock_data:/docs/mock:ro
      - ./services/steamships-ai-api/app:/app/app
    ports:
      - "${AI_API_PORT:-9000}:9000"
    networks:
      default:
        aliases:
          - ai-api
          - rag-api
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  default:
    driver: bridge